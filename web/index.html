<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1625">
<title>Sift</title>
<script>
  // Runs before style.css loads, so a notification's full-page navigation (a real
  // reload, not an in-app route change) paints the right background immediately
  // instead of flashing the browser's default white/black first.
  var t = localStorage.getItem('theme');
  if (t) document.documentElement.dataset.theme = t;
  var p = localStorage.getItem('palette');
  if (p) document.documentElement.dataset.palette = p;
  var isDark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.style.background = isDark ? '#1a1625' : '#fff8fb';
</script>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sticky-header">
    <header class="topbar">
      Sift
      <span>
        <button id="searchBtn" class="icon-btn" title="Search">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
          </svg>
        </button>
        <button id="foldersBtn" class="icon-btn" title="Folders">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/>
          </svg>
        </button>
        <button id="settingsBtn" class="logout-btn">Settings</button>
      </span>
    </header>

    <div class="dry-run-banner" id="dryRunBanner">Dry run mode — nothing will be saved</div>

    <div class="folder-banner hidden" id="folderBanner">
      <button id="folderBannerBack">← Inbox</button>
      <span id="folderBannerName"></span>
    </div>

    <div class="account-filter-bar hidden" id="accountFilterBar"></div>
  </div>

  <div class="pull-indicator" id="pullIndicator">
    <span class="pull-icon" id="pullIcon">📨</span>
    <span class="pull-text" id="pullText">Pull to refresh</span>
  </div>

  <ul class="inbox" id="inbox"></ul>

  <div id="searchPanel" class="accounts-panel hidden">
    <form id="searchForm" class="search-form search-form-row">
      <input id="searchInput" type="search" placeholder="Search all mail…" autocomplete="off">
      <button id="closeSearchBtn" type="button" class="icon-btn" title="Close">✕</button>
    </form>
    <button id="searchFolderScope" type="button" class="search-scope-btn hidden"></button>
    <p id="searchAccountScope" class="search-scope-label"></p>

    <button id="advancedSearchToggle" type="button" class="search-advanced-toggle">Advanced filters ▾</button>
    <div id="advancedSearchPanel" class="search-advanced hidden">
      <input id="searchFromInput" type="text" placeholder="From (sender contains…)" autocomplete="off">
      <button id="searchFolderPickerToggle" type="button" class="search-scope-btn">Choose folders…</button>
      <div id="searchFolderPicker" class="folder-tree search-folder-picker hidden"></div>
    </div>

    <div id="searchProgress" class="search-progress hidden">
      <div class="search-progress-bar"><div id="searchProgressFill" class="search-progress-fill"></div></div>
      <p id="searchProgressText" class="search-progress-text"></p>
    </div>
    <button id="continueSearchBtn" type="button" class="search-scope-btn hidden"></button>
    <button id="deepSearchBtn" type="button" class="search-scope-btn hidden">Deep search (slower — also searches message bodies)</button>
    <p id="searchError" class="form-error"></p>
    <ul id="searchResults" class="inbox search-results"></ul>
  </div>

  <div id="accountsPanel" class="accounts-panel hidden">
    <h2>Accounts</h2>
    <ul id="accountsList" class="accounts-list"></ul>
    <button id="showAddAccountBtn" class="show-add-account-btn">+ Add account</button>
    <form id="addAccountForm" class="hidden">
      <input name="email" type="email" placeholder="Email address" required>
      <input name="host" type="text" placeholder="IMAP host (e.g. imap.fastmail.com)" required>
      <input name="port" type="number" placeholder="Port (e.g. 993)" value="993" required>
      <input name="username" type="text" placeholder="Username" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Add account</button>
      <p id="addAccountError" class="form-error"></p>
    </form>
    <button id="closeAccountsBtn">Close</button>
  </div>

  <div id="settingsPanel" class="accounts-panel hidden">
    <h2>Settings</h2>
    <h3 class="settings-subhead">Theme</h3>
    <div id="themeOptions" class="theme-options"></div>
    <h3 class="settings-subhead">Color palette</h3>
    <div id="paletteSwatches" class="palette-swatches"></div>
    <h3 class="settings-subhead">Account</h3>
    <button id="accountsBtn" class="settings-row-btn">Accounts</button>
    <h3 class="settings-subhead">Notifications</h3>
    <button id="enablePushBtn" class="settings-row-btn">Enable notifications</button>
    <p id="pushError" class="form-error"></p>
    <h3 class="settings-subhead">Advanced</h3>
    <button id="dryRunBtn" class="settings-row-btn">Dry run mode</button>
    <button id="logoutBtn" class="settings-row-btn logout-row">Log out</button>
    <button id="closeSettingsBtn" class="close-panel-btn">Close</button>
  </div>

  <!-- One shared bottom-sheet for every folder picker: the topbar Folders shortcut,
       the Folder Browser inside it, and the swipe-to-move destination picker. They were
       previously two near-identical modals; sharing one means a fix/tweak to the shell
       (loading state, backdrop-tap-close, caching) only has to happen once. -->
  <div id="folderSheetModal" class="move-modal hidden">
    <div class="move-modal-content">
      <div class="move-modal-header">
        <span id="folderSheetTitle">Folders</span>
        <button id="folderSheetClose">✕</button>
      </div>
      <p id="folderSheetError" class="form-error"></p>
      <div id="folderSheetBody" class="folder-tree move-folder-tree"></div>
    </div>
  </div>

  <div id="mailReaderPanel" class="accounts-panel mail-reader-panel hidden">
    <div class="mail-reader-header">
      <button id="mailReaderBack">← Back</button>
    </div>
    <div class="mail-reader-meta">
      <div class="mail-reader-subject" id="mailReaderSubject"></div>
      <div class="mail-reader-sender" id="mailReaderSender"></div>
      <div class="mail-reader-time" id="mailReaderTime"></div>
    </div>
    <pre class="mail-reader-body" id="mailReaderBody"></pre>
    <iframe class="mail-reader-html hidden" id="mailReaderHtml" sandbox></iframe>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
